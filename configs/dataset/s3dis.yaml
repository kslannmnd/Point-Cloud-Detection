name: s3dis
type: s3dis
source_dir: ${env.kaggle.input_s3dis_dir}
repo_dataset_dir: ${softgroup.repo_dir}/dataset/s3dis
raw_dir_name: Stanford3dDataset_v1.2
preprocess: true
force_rebuild_preprocess: true
preprocessed:
  enabled: false
  source_dir: ${env.kaggle.input_s3dis_preprocessed_dir}
  archive_path: ${project.data_dir}/S3DIS_preprocessed.zip
  extract_dir: ${project.data_dir}/S3DIS_preprocessed
  copy_mode: symlink
  required_dirs:
    - preprocess
    - preprocess_sample
    - val_gt
crop:
  enabled: true
  keep_rooms:
    - office_1
    - office_2
    - office_3
fold:
  preferred_test_area: Area_5
classes:
  - door
  - table
  - chair
  - sofa
  - bookcase
  - board
