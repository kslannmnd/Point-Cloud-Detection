name: r3d
type: r3d
data_dir: ${project.data_dir}/r3d
converted_dir: ${project.outputs_dir}/r3d_point_clouds
frame_index: 0
confidence_threshold: 1
z_min: null
z_max: null
sample_step: 1
use_rgb: true
max_points_plot: 35000
point_size: 2.5
plot_height: 800
classes:
  - door
  - table
  - chair
  - sofa
  - bookcase
  - board
bbox:
  csv_path: null
  label_column: label
  color_column: color
  default_color: red
  outlier_quantile: 0.02
softgroup_adapter:
  enabled: true
  note: Convert R3D single-frame point clouds into a temporary SoftGroup S3DIS-style test scene.
